<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" fill="none">
  <defs>
    <linearGradient id="lmm-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="bar-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="rgba(188,140,255,0.3)"/>
    </linearGradient>
    <filter id="lmm-glow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="280" height="180" rx="12" fill="url(#lmm-bg)"/>
  <rect x="0.5" y="0.5" width="279" height="179" rx="12" stroke="#30363d" stroke-width="1" fill="none"/>

  <!-- Grid lines -->
  <g stroke="#21262d" stroke-width="0.5">
    <line x1="30" y1="25" x2="30" y2="148"/>
    <line x1="30" y1="148" x2="265" y2="148"/>
    <line x1="30" y1="90" x2="265" y2="90" stroke-dasharray="2,4" opacity="0.4"/>
    <line x1="30" y1="55" x2="265" y2="55" stroke-dasharray="2,4" opacity="0.3"/>
    <line x1="30" y1="120" x2="265" y2="120" stroke-dasharray="2,4" opacity="0.3"/>
  </g>

  <!-- Bars: L1 through L10 with upward sloping term structure -->
  <g>
    <!-- L1 -->
    <rect x="34" y="125" width="18" height="23" rx="2" fill="url(#bar-grad)" stroke="#bc8cff" stroke-width="0.5"/>
    <!-- L2 -->
    <rect x="57" y="118" width="18" height="30" rx="2" fill="url(#bar-grad)" stroke="#bc8cff" stroke-width="0.5"/>
    <!-- L3 -->
    <rect x="80" y="110" width="18" height="38" rx="2" fill="url(#bar-grad)" stroke="#bc8cff" stroke-width="0.5"/>
    <!-- L4 -->
    <rect x="103" y="102" width="18" height="46" rx="2" fill="url(#bar-grad)" stroke="#bc8cff" stroke-width="0.5"/>
    <!-- L5 -->
    <rect x="126" y="94" width="18" height="54" rx="2" fill="url(#bar-grad)" stroke="#bc8cff" stroke-width="0.5"/>
    <!-- L6 -->
    <rect x="149" y="88" width="18" height="60" rx="2" fill="url(#bar-grad)" stroke="#bc8cff" stroke-width="0.5"/>
    <!-- L7 -->
    <rect x="172" y="82" width="18" height="66" rx="2" fill="url(#bar-grad)" stroke="#bc8cff" stroke-width="0.5"/>
    <!-- L8 -->
    <rect x="195" y="76" width="18" height="72" rx="2" fill="url(#bar-grad)" stroke="#bc8cff" stroke-width="0.5"/>
    <!-- L9 -->
    <rect x="218" y="70" width="18" height="78" rx="2" fill="url(#bar-grad)" stroke="#bc8cff" stroke-width="0.5"/>
    <!-- L10 -->
    <rect x="241" y="64" width="18" height="84" rx="2" fill="url(#bar-grad)" stroke="#bc8cff" stroke-width="0.5"/>
  </g>

  <!-- Bar labels -->
  <g fill="#8b949e" font-size="7" font-family="sans-serif" text-anchor="middle">
    <text x="43" y="158">L1</text>
    <text x="66" y="158">L2</text>
    <text x="89" y="158">L3</text>
    <text x="112" y="158">L4</text>
    <text x="135" y="158">L5</text>
    <text x="158" y="158">L6</text>
    <text x="181" y="158">L7</text>
    <text x="204" y="158">L8</text>
    <text x="227" y="158">L9</text>
    <text x="250" y="158">L10</text>
  </g>

  <!-- Faint MC paths overlaid (to hint at simulation) -->
  <g opacity="0.15" stroke="#bc8cff" stroke-width="0.7" fill="none">
    <path d="M43,125 Q89,112 135,98 Q181,88 227,72 Q250,66 265,60"/>
    <path d="M43,128 Q89,118 135,105 Q181,95 227,82 Q250,78 265,74"/>
    <path d="M43,122 Q89,108 135,90 Q181,78 227,65 Q250,58 265,52"/>
    <path d="M43,130 Q89,122 135,110 Q181,100 227,88 Q250,82 265,80"/>
    <path d="M43,120 Q89,105 135,85 Q181,72 227,58 Q250,50 265,45"/>
  </g>

  <!-- Axis labels -->
  <text x="148" y="172" text-anchor="middle" fill="#8b949e" font-size="9" font-family="sans-serif">Forward Rate Tenor</text>
  <text x="14" y="92" text-anchor="middle" fill="#8b949e" font-size="9" font-family="sans-serif" transform="rotate(-90,14,92)">Rate</text>

  <!-- Title -->
  <text x="148" y="18" text-anchor="middle" fill="#bc8cff" font-size="11" font-weight="600" font-family="sans-serif">LMM Discrete Forward Rates</text>
</svg>
